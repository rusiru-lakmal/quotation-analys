version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: insurance_ai_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: supersecretpassword
      MONGO_INITDB_DATABASE: quotation_ai
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
